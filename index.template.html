<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <base href="/">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <title></title>
  <link rel="stylesheet" href="/css/global.css">
  <script>
    window.ENV = {
      APIVIDEO: "APIVIDEO_PLACEHOLDER",
      AppPagoJoeontheSoundWebClientID: "CLIENT_ID_PLACEHOLDER"
    };
  </script>
</head>
<body>
  <svg class="svg-filter-bank" width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <filter id="turbulent-displace" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.12" numOctaves="2" seed="7" result="noise-a">
          <animate attributeName="baseFrequency" values="0.018 0.12;0.028 0.085;0.018 0.12" dur="3.8s" repeatCount="indefinite"/>
        </feTurbulence>
        <feOffset in="noise-a" dx="0" dy="0" result="noise-a-shifted">
          <animate attributeName="dx" values="-7;8;-7" dur="2.7s" repeatCount="indefinite"/>
          <animate attributeName="dy" values="5;-6;5" dur="3.3s" repeatCount="indefinite"/>
        </feOffset>
        <feTurbulence type="turbulence" baseFrequency="0.095 0.025" numOctaves="1" seed="19" result="noise-b"/>
        <feOffset in="noise-b" dx="0" dy="0" result="noise-b-shifted">
          <animate attributeName="dx" values="6;-8;6" dur="3.1s" repeatCount="indefinite"/>
          <animate attributeName="dy" values="-4;7;-4" dur="2.5s" repeatCount="indefinite"/>
        </feOffset>
        <feBlend in="noise-a-shifted" in2="noise-b-shifted" mode="screen" result="combined-noise"/>
        <feDisplacementMap in="SourceGraphic" in2="combined-noise" scale="9" xChannelSelector="R" yChannelSelector="B"/>
      </filter>
    </defs>
  </svg>
  <div id="ambient-layer" aria-hidden="true"></div>
  <header id="site-header"></header>
  <main id="app" tabindex="-1"></main>
  <footer id="site-footer"></footer>
  <div id="mobile-dock"></div>
  <div id="modal-root"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
