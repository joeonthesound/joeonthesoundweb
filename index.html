  <style>
    :root {
      --bg: #050508;
      --panel: #0d0d14;
      --panel-hover: #141421;
      --primary: #5200ff;
      --primary-hover: #6e24ff;
      --primary-glow: rgba(82, 0, 255, 0.4);
      --accent: #f2ff5e;
      --accent-hover: #e1ff00;
      --text-main: #ffffff;
      --text-muted: #8a8a9e;
      --text-light: #d8d8e5;
      --border: rgba(255, 255, 255, 0.05);
      --border-accent: rgba(242, 255, 94, 0.2);
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --sidebar-w: 280px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-sans);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--panel);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* APP CONTAINER LAYOUT */
    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    @media (min-width: 1024px) {
      .app-container {
        flex-direction: row;
      }
    }

    /* SIDEBAR NAVEGACIÓN DESKTOP */
    .app-sidebar {
      background-color: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      flex-shrink: 0;
    }

    @media (min-width: 1024px) {
      .app-sidebar {
        width: var(--sidebar-w);
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        border-bottom: none;
        border-right: 1px solid var(--border);
        z-index: 50;
        overflow-y: auto;
      }
    }

    /* BRAND LOGO */
    .brand-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-main);
      margin-bottom: 2.5rem;
    }

    .brand-logo-img {
      width: clamp(48px, 10vw, 56px);
      height: auto;
      object-fit: contain;
      border-radius: 8px;
    }

    .brand-info {
      display: flex;
      flex-direction: column;
    }

    .brand-title-text {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .brand-subtitle-text {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ENLACES DE MENÚ (DESKTOP) */
    .sidebar-menu {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
    }

    @media (min-width: 1024px) {
      .sidebar-menu {
        display: flex;
      }
    }

    .menu-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      font-family: var(--font-display);
      transition: var(--transition);
    }

    .menu-link:hover, .menu-link.active {
      color: var(--text-main);
      background-color: rgba(82, 0, 255, 0.12);
    }

    .menu-link.active {
      border-left: 3px solid var(--accent);
      color: var(--accent);
    }

    /* MENÚ MÓVIL (DOCK INFERIOR) */
    .mobile-menu-dock {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background-color: rgba(5, 5, 8, 0.98);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 99;
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (min-width: 1024px) {
      .mobile-menu-dock {
        display: none;
      }
    }

    .mobile-link-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 600;
      font-family: var(--font-display);
      gap: 2px;
      flex: 1;
      height: 100%;
    }

    .mobile-link-item svg {
      width: 18px;
      height: 18px;
    }

    .mobile-link-item.active {
      color: var(--accent);
    }

    /* CONTENEDOR CENTRAL */
    .app-main-content {
      flex: 1;
      padding-bottom: 130px;
    }

    @media (min-width: 1024px) {
      .app-main-content {
        margin-left: var(--sidebar-w);
        padding-bottom: 90px;
      }
    }

    /* PERSISTENT STICKY DOCK */
    .music-sticky-dock {
      position: fixed;
      bottom: 64px;
      left: 0;
      right: 0;
      height: 44px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
      overflow-x: auto;
      white-space: nowrap;
      padding: 0 1rem;
      gap: 1.2rem;
      border-top: 1px solid var(--border-accent);
    }

    @media (min-width: 1024px) {
      .music-sticky-dock {
        bottom: 0;
        left: var(--sidebar-w);
        height: 52px;
        gap: 2rem;
      }
    }

    .sticky-dock-label {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .sticky-dock-anchors {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .sticky-dock-anchor {
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition);
    }

    .sticky-dock-anchor:hover {
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* PÁGINAS VIRTUALES */
    .view-container {
      padding: 1.5rem 1rem 6rem 1rem;
      max-width: 1120px;
      margin: 0 auto;
      animation: viewFadeIn 0.35s ease-out forwards;
    }

    @media (min-width: 1024px) {
      .view-container {
        padding: 3rem 2.5rem;
      }
    }

    @keyframes viewFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .heading-primary {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    .accent-phrase {
      color: var(--accent);
    }

    /* HERO BANNER */
    .home-hero-banner {
      background: radial-gradient(circle at top right, rgba(82,0,255,0.15) 0%, transparent 80%), var(--panel);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 2.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-bottom: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 768px) {
      .home-hero-banner {
        flex-direction: row;
        align-items: center;
        padding: 4rem 3rem;
      }
    }

    .home-hero-logo {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--accent);
      box-shadow: 0 0 25px var(--primary-glow);
      flex-shrink: 0;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .home-hero-logo {
        width: 160px;
        height: 160px;
        margin: 0;
      }
    }

    .home-hero-info {
      flex: 1;
      text-align: center;
    }

    @media (min-width: 768px) {
      .home-hero-info {
        text-align: left;
      }
    }

    .home-hero-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }

    .home-hero-desc {
      font-size: 1rem;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    /* BADGE REGIONAL */
    .badge-location {
      background: rgba(82,0,255,0.25);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.3rem 0.75rem;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-flex;
      margin-bottom: 1rem;
    }

    /* BOTONES */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1.6rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      transition: var(--transition);
      cursor: pointer;
      border: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: var(--font-display);
    }

    .btn-solid-primary {
      background-color: var(--accent);
      color: #050508;
    }

    .btn-solid-primary:hover {
      background-color: var(--accent-hover);
      transform: translateY(-2px);
    }

    .btn-outline-primary {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    .btn-outline-primary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* GRID DE DISCOS / TARJETAS */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }

    @media (min-width: 768px) {
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 1.5rem;
      }
    }

    .visual-card {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-decoration: none;
      color: var(--text-main);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .visual-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .card-cover-wrapper {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
      background: var(--bg);
      position: relative;
    }

    .card-cover-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(5, 5, 8, 0.9);
      color: var(--accent);
      padding: 0.25rem 0.5rem;
      font-size: 0.65rem;
      font-weight: 800;
      border-radius: 4px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* SPOTIFY POPULAR TRACKS (DISEÑO PREMIUM) */
    .spotify-tracklist {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: var(--panel);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .track-row {
      display: grid;
      grid-template-columns: 28px 1fr 60px 32px;
      align-items: center;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .track-row:hover {
      background-color: var(--panel-hover);
    }

    .track-index-num {
      color: var(--text-muted);
      font-weight: 700;
      font-size: 0.85rem;
    }

    .track-info-cell {
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    .track-cover-miniature {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }

    .track-cover-miniature img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .track-titles {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .track-main-title {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-main);
    }

    .track-artist-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .track-duration-val {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: right;
    }

    .track-action-cell {
      display: flex;
      justify-content: flex-end;
    }

    .track-play-bubble {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      cursor: pointer;
      font-size: 0.75rem;
    }

    .track-row:hover .track-play-bubble {
      background-color: var(--accent);
      color: #050508;
      border-color: var(--accent);
    }

    /* GRID DE DIFERENCIACIÓN / CARDS */
    .grid-differentiator {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    @media (min-width: 768px) {
      .grid-differentiator {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1200px) {
      .grid-differentiator {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .diff-brand-card {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      transition: var(--transition);
      position: relative;
    }

    .diff-brand-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .diff-card-digit {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 2.2rem;
      font-weight: 800;
      color: rgba(255,255,255,0.02);
      font-family: var(--font-display);
    }

    .diff-card-header {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
    }

    .diff-card-desc {
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.9rem;
    }

    /* MANIFIESTO MARCA */
    .brand-manifesto-quote {
      border-left: 4px solid var(--accent);
      padding: 1.5rem;
      background: rgba(242, 255, 94, 0.03);
      border-radius: 0 12px 12px 0;
      margin-bottom: 2.5rem;
    }

    .manifesto-quote-text {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.5;
      font-style: italic;
      color: var(--text-main);
    }

    /* TABLA DE MÉTRICAS */
    .metrics-visual-wrapper {
      background: var(--panel);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow-x: auto;
      margin-bottom: 3rem;
    }

    .metrics-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      min-width: 600px;
    }

    .metrics-table th, .metrics-table td {
      padding: 1.2rem 1.5rem;
    }

    .metrics-table th {
      background: rgba(82, 0, 255, 0.1);
      color: var(--accent);
      text-transform: uppercase;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--border);
    }

    .metrics-table tr {
      border-bottom: 1px solid var(--border);
    }

    .metrics-table tr:last-child {
      border-bottom: none;
    }

    .metrics-platform {
      font-family: var(--font-display);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .metrics-past-stats {
      color: var(--text-light);
      font-size: 0.9rem;
    }

      const toast = document.createElement('div');
      toast.className = 'notification-toast';
      toast.textContent = message;

    // CONTROLLER SPA DEL RUTEO DE PÁGINAS
    const Router = {
      routes: {},
      addRoute: function(path, handler) { this.routes[path] = handler; },
      resolve: function() {
        const hash = window.location.hash || '#/';
        let matchedHandler = null;
        let params = {};

        for (const routePath in this.routes) {
          const routeRegex = new RegExp("^" + routePath.replace(/:[^\s/]+/g, "([\\w-]+)") + "$");
          const match = hash.match(routeRegex);
          if (match) {
            matchedHandler = this.routes[routePath];
            const paramNames = (routePath.match(/:[^\s/]+/g) || []).map(p => p.slice(1));
            paramNames.forEach((name, idx) => { params[name] = match[idx + 1]; });
            break;
          }
        }

        if (matchedHandler) {
          matchedHandler(params);
        } else {
          window.location.hash = '#/';
        }
        this.updateActiveLinks(hash);
        window.scrollTo(0, 0);
      },
      updateActiveLinks: function(currentHash) {
        let activeRoute = 'home';
        if (currentHash.startsWith('#/proyecto')) activeRoute = 'proyecto';
        else if (currentHash.startsWith('#/musica') || currentHash.startsWith('#/release') || currentHash.startsWith('#/album') || currentHash.startsWith('#/discografia')) activeRoute = 'musica';
        else if (currentHash.startsWith('#/videos')) activeRoute = 'videos';
        else if (currentHash.startsWith('#/servicios')) activeRoute = 'servicios';
        else if (currentHash.startsWith('#/sobre-joe')) activeRoute = 'sobre-joe';
        else if (currentHash.startsWith('#/prensa')) activeRoute = 'prensa';
        else if (currentHash.startsWith('#/cotizador')) activeRoute = 'cotizador';
        else if (currentHash.startsWith('#/contacto')) activeRoute = 'contacto';
        else if (currentHash.startsWith('#/ai')) activeRoute = 'ai';

        document.querySelectorAll('[data-route]').forEach(link => {
          if (link.getAttribute('data-route') === activeRoute) link.classList.add('active');
          else link.classList.remove('active');
        });
      }
    };

      const checkBoxes = document.querySelectorAll('.quoter-extra-cb');

          quoterState.extras.push({

            cost: parseInt(cb.getAttribute('data-cost'))
          });

    function setupQuoterListeners() {
      const container = document.getElementById('viewport');
      if (!container) return;

      const stepContainers = container.querySelectorAll('.quoter-options-container');
      stepContainers.forEach(group => {
        const key = group.getAttribute('data-quoter-var');
        if (!key) return;
        const buttons = group.querySelectorAll('.quoter-option-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            if (key === 'formato') {
              quoterState.formato.value = btn.getAttribute('data-value');
              quoterState.formato.multiplier = parseFloat(btn.getAttribute('data-multiplier'));
            } else if (key === 'vocal') {
              quoterState.vocal.value = btn.getAttribute('data-value');
              quoterState.vocal.hours = parseInt(btn.getAttribute('data-hours'));
            } else if (key === 'perfil_plataformas') {
              quoterState.tienePerfil = btn.getAttribute('data-value');
            }
          });
        });
      });
    }

      if (dir === 1) {
        if (currentQuoterStep === 3) {
          const nameInput = document.getElementById('quoterPlatformName');
          const linkInput = document.getElementById('quoterPlatformLink');
          if (quoterState.tienePerfil === "SI" && nameInput && linkInput) {
            const platName = nameInput.value.trim();
            const platLink = linkInput.value.trim();
            if (!platName || !platLink) {

              return;

            quoterState.plataformaName = platName;
            quoterState.plataformaLink = platLink;

      } else {
        currentQuoterStep = Math.max(1, currentQuoterStep - 1);

      window.updateQuoterStateFromInputs();
      window.updateQuoterExtras();
      updateQuoterUI();

    function calculateQuoterTotal() {
      const baseOccasion = quoterState.ocasion.cost;
      const formatMultiplier = quoterState.formato.multiplier;
      const calculatedOccasion = Math.round(baseOccasion * formatMultiplier);

      const hoursCost = quoterState.vocal.hours * 200;
      const styleCost = quoterState.estilo.cost;
      const extrasCost = quoterState.extras.reduce((acc, curr) => acc + curr.cost, 0);

      return calculatedOccasion + hoursCost + styleCost + extrasCost;
    }

    window.submitContactForm = function(event) {
      event.preventDefault();
      const name = document.getElementById('contactFormName').value.trim();
      const channel = document.getElementById('contactFormChannel').value;
      const message = document.getElementById('contactFormMessage').value.trim();

      const baseText = `Hola JOE, mi nombre es ${name}. Propuesta: ${message}`;
      const encoded = encodeURIComponent(baseText);

      if (channel === 'WAPA') {
        window.open(`https://wa.me/50765164741?text=${encoded}`, '_blank');
      } else if (channel === 'WAFR') {
        window.open(`https://wa.me/33759643453?text=${encoded}`, '_blank');
      } else {
        window.location.href = `mailto:j@joeshostel.online?subject=Propuesta de ${encodeURIComponent(name)}&body=${encoded}`;
      }
      showToast('Abriendo el canal preferencial seleccionado...');
    };
