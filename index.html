  <style>
    :root {
      --bg: #050508;
      --panel: #0d0d14;
      --panel-hover: #141421;
      --primary: #5200ff;
      --primary-hover: #6e24ff;
      --primary-glow: rgba(82, 0, 255, 0.4);
      --accent: #f2ff5e;
      --accent-hover: #e1ff00;
      --fucsia: #ff2bd6;
      --fucsia-soft: #ff6ae4;
      --fucsia-glow: rgba(255, 43, 214, 0.35);
      --grad-brand: linear-gradient(100deg, var(--accent) 0%, var(--fucsia) 65%, var(--primary-hover) 110%);
      --grad-line: linear-gradient(90deg, var(--fucsia), var(--primary) 60%, transparent);
      --text-main: #ffffff;
      --text-muted: #8a8a9e;
      --text-light: #d8d8e5;
      --border: rgba(255, 255, 255, 0.05);
      --border-accent: rgba(242, 255, 94, 0.2);
      --border-fucsia: rgba(255, 43, 214, 0.28);
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Space Grotesk', sans-serif;
      --sidebar-w: 280px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ===== TEMA CLARO (editorial luminoso) ===== */
    html[data-theme="light"] {
      --bg: #f4f3f8;
      --panel: #ffffff;
      --panel-hover: #fbf9ff;
      --primary: #5200ff;
      --primary-hover: #6e24ff;
      --primary-glow: rgba(82, 0, 255, 0.18);
      --accent: #d6c400;
      --accent-hover: #b8a800;
      --fucsia: #d6009e;
      --fucsia-soft: #ff2bd6;
      --fucsia-glow: rgba(214, 0, 158, 0.18);
      --text-main: #0c0c14;
      --text-muted: #5d5d72;
      --text-light: #2a2a3a;
      --border: rgba(12, 12, 20, 0.08);
      --border-accent: rgba(120, 110, 0, 0.28);
      --border-fucsia: rgba(214, 0, 158, 0.25);
    }
    html[data-theme="light"] .btn-solid-primary { color: #ffffff; }
    html[data-theme="light"] ::selection { background: var(--fucsia); color: #ffffff; }
    html[data-theme="light"] .bg-aura { opacity: 0.5; }

    /* Transición suave al cambiar de tema */
    html, body, .app-sidebar, .topbar, .visual-card, .video-asset-card,
    .quoter-component-panel, .music-sticky-dock, .mobile-menu-dock,
    .faq-item, .global-controls, .lang-select {
      transition: background-color 0.45s var(--ease-out), color 0.45s var(--ease-out), border-color 0.45s var(--ease-out);
    }

    /* ===== CONTROLES GLOBALES (tema + idioma) ===== */
    .global-controls {
      position: fixed;
      top: 1rem;
      right: 1.1rem;
      z-index: 1400;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.4rem 0.55rem;
      background: color-mix(in srgb, var(--panel) 82%, transparent);
      border: 1px solid var(--border-fucsia);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    }
    @media (max-width: 768px) {
      .global-controls {
        top: auto;
        bottom: calc(72px + env(safe-area-inset-bottom, 0px));
        right: 0.8rem;
        padding: 0.35rem 0.45rem;
        gap: 0.5rem;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: var(--panel);
      }
    }

    /* Switch tema animado */
    .theme-switch {
      position: relative;
      width: 56px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border-fucsia);
      background: linear-gradient(100deg, var(--primary) 0%, var(--fucsia) 100%);
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      overflow: hidden;
    }
    .theme-switch__track-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      color: #fff;
      opacity: 0.85;
      pointer-events: none;
    }
    .theme-switch__track-icon.moon { left: 7px; }
    .theme-switch__track-icon.sun  { right: 7px; opacity: 0.55; }
    html[data-theme="light"] .theme-switch__track-icon.sun { opacity: 1; }
    html[data-theme="light"] .theme-switch__track-icon.moon { opacity: 0.5; }
    .theme-switch__knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
      transition: transform 0.45s var(--ease-out);
      z-index: 2;
    }
    html[data-theme="light"] .theme-switch__knob { transform: translateX(28px); }
    .theme-switch:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* Selector de idioma */
    .lang-select {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 1.7rem 0.35rem 0.7rem;
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      background-image: linear-gradient(45deg, transparent 50%, var(--fucsia) 50%), linear-gradient(135deg, var(--fucsia) 50%, transparent 50%);
      background-position: calc(100% - 13px) center, calc(100% - 8px) center;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }
    .lang-select:focus-visible { outline: 2px solid var(--fucsia); outline-offset: 2px; }
    .lang-select option { background: var(--panel); color: var(--text-main); }

    /* ===== FAQ ACORDEÓN ===== */
    .faq-section { margin-top: 4.5rem; }
    .faq-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.8rem; }
    .faq-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      overflow: hidden;
    }
    .faq-item.open { border-color: var(--border-fucsia); }
    .faq-q {
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      padding: 1.25rem 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      line-height: 1.4;
    }
    .faq-q__icon {
      flex-shrink: 0;
      width: 26px; height: 26px;
      display: grid; place-items: center;
      border-radius: 50%;
      border: 1px solid var(--border-fucsia);
      color: var(--fucsia);
      font-size: 1.1rem;
      transition: transform 0.4s var(--ease-out);
    }
    .faq-item.open .faq-q__icon { transform: rotate(45deg); background: var(--fucsia); color: #fff; }
    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s var(--ease-out);
    }
    .faq-a__inner {
      padding: 0 1.4rem 1.4rem;
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-sans);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    ::selection { background: var(--fucsia); color: #050508; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--panel); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fucsia); }

    /* ============================================================
       CAPA AMBIENTAL ARTÍSTICA (aurora violeta + fucsia)
       Solo transform/opacity → composición GPU, sin repaints.
    ============================================================ */
    .bg-aura {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-aura span {
      position: absolute;
      width: 55vmax;
      height: 55vmax;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.16;
      will-change: transform;
    }

    .bg-aura .aura-violet {
      background: radial-gradient(circle, #5200ff 0%, transparent 65%);
      top: -20vmax;
      right: -15vmax;
      animation: auraDriftA 26s ease-in-out infinite alternate;
    }

    .bg-aura .aura-fucsia {
      background: radial-gradient(circle, #ff2bd6 0%, transparent 65%);
      bottom: -22vmax;
      left: -18vmax;
      animation: auraDriftB 32s ease-in-out infinite alternate;
    }

    @keyframes auraDriftA {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to   { transform: translate3d(-10vmax, 12vmax, 0) scale(1.18); }
    }

    @keyframes auraDriftB {
      from { transform: translate3d(0, 0, 0) scale(1.1); }
      to   { transform: translate3d(12vmax, -10vmax, 0) scale(0.92); }
    }

    @media (max-width: 768px) {
      .bg-aura span { filter: blur(48px); opacity: 0.13; }
    }

    /* ============================================================
       SCROLL-TRIGGER REVEALS (clase .rv aplicada por JS)
    ============================================================ */
    .rv {
      opacity: 0;
      transform: translateY(26px);
    }

    .rv.in-view {
      opacity: 1;
      transform: translateY(0);
      transition:
        opacity 0.7s var(--ease-out),
        transform 0.8s var(--ease-out);
      transition-delay: calc(var(--rv-i, 0) * 80ms);
    }

    .rv-scale { transform: translateY(18px) scale(0.97); }
    .rv-scale.in-view { transform: translateY(0) scale(1); }

    @media (prefers-reduced-motion: reduce) {
      .rv, .rv.in-view { opacity: 1 !important; transform: none !important; transition: none !important; }
      .bg-aura span, .ticker-track, .eq i, .home-hero-logo { animation: none !important; }
      html { scroll-behavior: auto; }
    }

    /* ============================================================
       TICKER EDITORIAL (cinta tipográfica infinita)
    ============================================================ */
    .editorial-ticker {
      overflow: hidden;
      border-top: 1px solid var(--border-fucsia);
      border-bottom: 1px solid var(--border-fucsia);
      margin: 0 0 2.5rem 0;
      padding: 0.7rem 0;
      mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
      -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
    }

    .ticker-track {
      display: flex;
      gap: 2.5rem;
      width: max-content;
      animation: tickerScroll 28s linear infinite;
      will-change: transform;
    }

    @keyframes tickerScroll {
      from { transform: translate3d(0, 0, 0); }
      to   { transform: translate3d(-50%, 0, 0); }
    }

    .ticker-item {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      color: transparent;
      -webkit-text-stroke: 1px var(--fucsia-soft);
      display: inline-flex;
      align-items: center;
      gap: 2.5rem;
    }

    .ticker-item em {
      font-style: normal;
      -webkit-text-stroke: 0;
      color: var(--accent);
    }

    .ticker-dot { color: var(--fucsia); -webkit-text-stroke: 0; }

    /* ============================================================
       ECUALIZADOR ANIMADO (firma sonora de la marca)
    ============================================================ */
    .eq {
      display: inline-flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
    }

    .eq i {
      width: 3px;
      border-radius: 2px;
      background: var(--grad-brand);
      animation: eqPulse 1s ease-in-out infinite;
      transform-origin: bottom;
      height: 100%;
      will-change: transform;
    }

    .eq i:nth-child(1) { animation-delay: 0s;    animation-duration: 0.9s; }
    .eq i:nth-child(2) { animation-delay: 0.15s; animation-duration: 1.15s; }
    .eq i:nth-child(3) { animation-delay: 0.3s;  animation-duration: 0.8s; }
    .eq i:nth-child(4) { animation-delay: 0.1s;  animation-duration: 1.05s; }
    .eq i:nth-child(5) { animation-delay: 0.25s; animation-duration: 0.95s; }

    @keyframes eqPulse {
      0%, 100% { transform: scaleY(0.25); }
      50%      { transform: scaleY(1); }
    }

    /* APP CONTAINER LAYOUT */
    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    @media (min-width: 1024px) {
      .app-container { flex-direction: row; }
    }

    /* SIDEBAR NAVEGACIÓN DESKTOP */
    .app-sidebar {
      background-color: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      flex-shrink: 0;
    }

    @media (min-width: 1024px) {
      .app-sidebar {
        width: var(--sidebar-w);
        height: 100vh;
        position: fixed;
        left: 0;
        top: 0;
        border-bottom: none;
        border-right: 1px solid var(--border);
        z-index: 50;
        overflow-y: auto;
      }
    }

    /* BRAND LOGO */
    .brand-box {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-main);
      margin-bottom: 2.5rem;
    }

    .brand-logo-img {
      width: clamp(48px, 10vw, 56px);
      height: auto;
      object-fit: contain;
      border-radius: 8px;
    }

    .brand-info { display: flex; flex-direction: column; }

    .brand-title-text {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .brand-subtitle-text {
      font-size: 0.65rem;
      color: var(--fucsia-soft);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    /* ENLACES DE MENÚ (DESKTOP) */
    .sidebar-menu { display: none; flex-direction: column; gap: 0.4rem; }

    @media (min-width: 1024px) {
      .sidebar-menu { display: flex; }
    }

    .menu-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      font-family: var(--font-display);
      transition: var(--transition);
      position: relative;
    }

    .menu-link:hover, .menu-link.active {
      color: var(--text-main);
      background: linear-gradient(90deg, rgba(82,0,255,0.18), rgba(255,43,214,0.06));
    }

    .menu-link.active {
      border-left: 3px solid var(--fucsia);
      color: var(--accent);
    }

    /* MENÚ MÓVIL (DOCK INFERIOR) — sin backdrop-filter en móvil para máximo FPS */
    .mobile-menu-dock {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background-color: rgba(5, 5, 8, 0.99);
      border-top: 1px solid var(--border-fucsia);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 99;
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (min-width: 1024px) {
      .mobile-menu-dock { display: none; }
    }

    .mobile-link-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.65rem;
      font-weight: 600;
      font-family: var(--font-display);
      gap: 2px;
      flex: 1;
      height: 100%;
      transition: color 0.25s ease, transform 0.25s var(--ease-out);
    }

    .mobile-link-item svg { width: 18px; height: 18px; }

    .mobile-link-item.active { color: var(--fucsia); transform: translateY(-2px); }

    /* CONTENEDOR CENTRAL */
    .app-main-content { flex: 1; padding-bottom: 130px; }

    @media (min-width: 1024px) {
      .app-main-content { margin-left: var(--sidebar-w); padding-bottom: 90px; }
    }

    /* PERSISTENT STICKY DOCK — degradado violeta → fucsia */
    .music-sticky-dock {
      position: fixed;
      bottom: 64px;
      left: 0;
      right: 0;
      height: 44px;
      background: linear-gradient(90deg, var(--primary) 0%, #8a14e8 55%, var(--fucsia) 130%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
      overflow-x: auto;
      white-space: nowrap;
      padding: 0 1rem;
      gap: 1.2rem;
      border-top: 1px solid var(--border-accent);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .music-sticky-dock::-webkit-scrollbar { display: none; }

    @media (min-width: 1024px) {
      .music-sticky-dock {
        bottom: 0;
        left: var(--sidebar-w);
        height: 52px;
        gap: 2rem;
      }
    }

    .sticky-dock-label {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .sticky-dock-anchors { display: flex; align-items: center; gap: 1rem; }

    .sticky-dock-anchor {
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: var(--transition);
    }

    .sticky-dock-anchor:hover { color: var(--accent); transform: translateY(-1px); }

    /* PÁGINAS VIRTUALES */
    .view-container {
      padding: 1.5rem 1rem 6rem 1rem;
      max-width: 1120px;
      margin: 0 auto;
      animation: viewFadeIn 0.35s ease-out forwards;
    }

    @media (min-width: 1024px) {
      .view-container { padding: 3rem 2.5rem; }
    }

    @keyframes viewFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* TITULARES EDITORIALES con subrayado-degradado animable */
    .heading-primary {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      position: relative;
      padding-bottom: 0.85rem;
    }

    .heading-primary::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 88px;
      height: 2px;
      background: var(--grad-line);
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 0.9s var(--ease-out) 0.15s;
    }

    .rv.in-view .heading-primary::after,
    .heading-primary.in-view::after { transform: scaleX(1); }

    /* Frase acento ahora en degradado amarillo → fucsia (editorial premium) */
    .accent-phrase {
      background: var(--grad-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Etiqueta "eyebrow" editorial */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-display);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--fucsia-soft);
      margin-bottom: 0.9rem;
    }

    .eyebrow::before {
      content: "";
      width: 26px;
      height: 1px;
      background: var(--fucsia);
    }

    /* HERO BANNER */
    .home-hero-banner {
      background:
        radial-gradient(circle at 85% 0%, rgba(82,0,255,0.18) 0%, transparent 55%),
        radial-gradient(circle at 0% 100%, rgba(255,43,214,0.12) 0%, transparent 55%),
        var(--panel);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 2.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-bottom: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Línea de horizonte fucsia animada dentro del hero */
    .home-hero-banner::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--fucsia), var(--accent), transparent);
      opacity: 0.7;
      transform: translateX(-100%);
      animation: heroSweep 5s var(--ease-out) infinite;
    }

    @keyframes heroSweep {
      0%   { transform: translateX(-100%); }
      55%  { transform: translateX(100%); }
      100% { transform: translateX(100%); }
    }

    @media (min-width: 768px) {
      .home-hero-banner {
        flex-direction: row;
        align-items: center;
        padding: 4rem 3rem;
      }
    }

    .home-hero-logo {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--fucsia);
      box-shadow: 0 0 25px var(--primary-glow), 0 0 45px var(--fucsia-glow);
      flex-shrink: 0;
      margin: 0 auto;
      animation: heroFloat 7s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes heroFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    @media (min-width: 768px) {
      .home-hero-logo { width: 160px; height: 160px; margin: 0; }
    }

    .home-hero-info { flex: 1; text-align: center; }

    @media (min-width: 768px) {
      .home-hero-info { text-align: left; }
    }

    .home-hero-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
      margin-bottom: 1rem;
      letter-spacing: -0.04em;
    }

    .home-hero-desc {
      font-size: 1rem;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    /* BADGE REGIONAL — toque fucsia */
    .badge-location {
      background: rgba(255, 43, 214, 0.12);
      border: 1px solid var(--fucsia);
      color: var(--fucsia-soft);
      padding: 0.3rem 0.75rem;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-flex;
      margin-bottom: 1rem;
    }

    /* BOTONES */
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1.6rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      transition: var(--transition);
      cursor: pointer;
      border: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: var(--font-display);
    }

    .btn-solid-primary { background-color: var(--accent); color: #050508; }

    .btn-solid-primary:hover {
      background-color: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--fucsia-glow);
    }

    .btn-outline-primary {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    .btn-outline-primary:hover {
      border-color: var(--fucsia);
      color: var(--fucsia-soft);
    }

    /* GRID DE DISCOS / TARJETAS */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }

    @media (min-width: 768px) {
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 1.5rem;
      }
    }

    .visual-card {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-decoration: none;
      color: var(--text-main);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      content-visibility: auto;
      contain-intrinsic-size: 280px;
    }

    .visual-card:hover {
      border-color: var(--fucsia);
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(255, 43, 214, 0.12);
    }

    .card-cover-wrapper {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1rem;
      background: var(--bg);
      position: relative;
    }

    .card-cover-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s var(--ease-out);
    }

    .visual-card:hover .card-cover-wrapper img { transform: scale(1.05); }

    .card-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(5, 5, 8, 0.9);
      color: var(--fucsia-soft);
      border: 1px solid var(--border-fucsia);
      padding: 0.25rem 0.5rem;
      font-size: 0.65rem;
      font-weight: 800;
      border-radius: 4px;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta { font-size: 0.8rem; color: var(--text-muted); }

    /* SPOTIFY POPULAR TRACKS */
    .spotify-tracklist {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: var(--panel);
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .track-row {
      display: grid;
      grid-template-columns: 28px 1fr 60px 32px;
      align-items: center;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
    }

    .track-row:hover { background-color: var(--panel-hover); }

    .track-index-num { color: var(--text-muted); font-weight: 700; font-size: 0.85rem; }

    .track-info-cell {
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    .track-cover-miniature {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }

    .track-cover-miniature img { width: 100%; height: 100%; object-fit: cover; }

    .track-titles { display: flex; flex-direction: column; min-width: 0; }

    .track-main-title {
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-main);
    }

    .track-artist-sub { font-size: 0.75rem; color: var(--text-muted); }

    .track-duration-val { font-size: 0.8rem; color: var(--text-muted); text-align: right; }

    .track-action-cell { display: flex; justify-content: flex-end; }

    .track-play-bubble {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
      cursor: pointer;
      font-size: 0.75rem;
    }

    .track-row:hover .track-play-bubble {
      background: var(--grad-brand);
      color: #050508;
      border-color: var(--fucsia);
    }

    /* GRID DE DIFERENCIACIÓN / CARDS */
    .grid-differentiator {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    @media (min-width: 768px) {
      .grid-differentiator { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1200px) {
      .grid-differentiator { grid-template-columns: repeat(3, 1fr); }
    }

    .diff-brand-card {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      transition: var(--transition);
      position: relative;
      content-visibility: auto;
      contain-intrinsic-size: 220px;
    }

    .diff-brand-card:hover {
      border-color: var(--fucsia);
      transform: translateY(-4px);
    }

    .diff-card-digit {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 2.2rem;
      font-weight: 800;
      color: rgba(255, 43, 214, 0.07);
      font-family: var(--font-display);
    }

    .diff-card-header {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
    }

    .diff-card-desc {
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.9rem;
    }

    /* MANIFIESTO MARCA */
    .brand-manifesto-quote {
      border-left: 4px solid var(--fucsia);
      padding: 1.5rem;
      background: linear-gradient(90deg, rgba(255,43,214,0.05), rgba(242,255,94,0.02));
      border-radius: 0 12px 12px 0;
      margin-bottom: 2.5rem;
    }

    .manifesto-quote-text {
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.5;
      font-style: italic;
      color: var(--text-main);
    }

    /* TABLA DE MÉTRICAS */
    .metrics-visual-wrapper {
      background: var(--panel);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow-x: auto;
      margin-bottom: 3rem;
      -webkit-overflow-scrolling: touch;
    }

    .metrics-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      min-width: 600px;
    }

    .metrics-table th, .metrics-table td { padding: 1.2rem 1.5rem; }

    .metrics-table th {
      background: linear-gradient(90deg, rgba(82, 0, 255, 0.12), rgba(255, 43, 214, 0.08));
      color: var(--accent);
      text-transform: uppercase;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--border-fucsia);
    }

    .metrics-table tr { border-bottom: 1px solid var(--border); }
    .metrics-table tr:last-child { border-bottom: none; }

    .metrics-platform {
      font-family: var(--font-display);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .metrics-past-stats { color: var(--text-light); font-size: 0.9rem; }

    .metrics-projection-stats { color: var(--fucsia-soft); font-weight: 700; font-size: 1rem; }

    .metrics-footer-note {
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.25);
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
    }

    /* VIDEOS GRID AND FILTERING */
    .video-library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .video-asset-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      content-visibility: auto;
      contain-intrinsic-size: 260px;
    }

    .video-asset-card:hover {
      border-color: var(--fucsia);
      transform: translateY(-4px);
    }

    .video-asset-preview { position: relative; aspect-ratio: 16/9; background-color: #000; }

    .video-asset-preview img { width: 100%; height: 100%; object-fit: cover; }

    .video-badge-duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background-color: rgba(5, 5, 8, 0.9);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .video-play-overlay-trigger {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: var(--transition);
    }

    .video-asset-card:hover .video-play-overlay-trigger { opacity: 1; }

    .video-icon-trigger { font-size: 1.8rem; color: var(--fucsia); }

    .video-detail-box { padding: 1rem; }

    .video-display-title {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-sub-stat { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.5rem; }

    .library-search-box { margin-bottom: 2rem; }

    .library-search-input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 0.9rem 1.4rem;
      border-radius: 50px;
      color: white;
      font-size: 0.95rem;
      font-family: var(--font-sans);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .library-search-input:focus {
      outline: none;
      border-color: var(--fucsia);
      box-shadow: 0 0 0 3px rgba(255, 43, 214, 0.12);
    }

    /* COTIZADOR MULTIPASOS PREMIUM */
    .quoter-component-panel {
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 1.8rem;
      margin-top: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    .quoter-header-track { display: flex; gap: 0.4rem; margin-bottom: 1.8rem; }

    .quoter-header-track i {
      height: 3px;
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    .quoter-header-track i.active { background: var(--grad-brand); }

    .quoter-slide { display: none; animation: quoterSlideIn 0.35s ease-out forwards; }
    .quoter-slide.active { display: block; }

    @keyframes quoterSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .quoter-slide h3 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .quoter-options-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.8rem;
      margin: 1.2rem 0;
    }

    .quoter-option-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      text-align: left;
      transition: var(--transition);
      cursor: pointer;
    }

    .quoter-option-btn:hover { border-color: var(--primary); }

    .quoter-option-btn.selected {
      border-color: var(--fucsia);
      background: linear-gradient(135deg, rgba(82, 0, 255, 0.16), rgba(255, 43, 214, 0.10));
    }

    .quoter-option-btn h4 {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.25rem;
    }

    .quoter-option-btn p { font-size: 0.75rem; color: var(--text-muted); }

    .quoter-navigation-tray {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    /* ESTILO FORMULARIOS COTIZADOR */
    .input-field-element {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    .input-field-element label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-field-element input, .input-field-element select, .input-field-element textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem;
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.9rem;
    }

    .input-field-element input:focus, .input-field-element select:focus, .input-field-element textarea:focus {
      outline: none;
      border-color: var(--fucsia);
    }

    .quoter-summary-block {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1.2rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .quoter-summary-block p { font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--text-light); }

    .quoter-summary-block p strong { color: var(--fucsia-soft); }

    .quoter-cost-total {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      background: var(--grad-brand);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    /* SECCIÓN CONTACTO Y FORMULARIO */
    .contact-layout-split {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      margin-top: 2rem;
    }

    @media (min-width: 1024px) {
      .contact-layout-split { grid-template-columns: 1fr 1.2fr; }
    }

    .contact-detail-card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 2rem;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* DETALLE LANZAMIENTO INTERNO */
    .release-details-flex { display: flex; flex-direction: column; gap: 2rem; }

    @media (min-width: 768px) {
      .release-details-flex { flex-direction: row; align-items: flex-start; }
    }

    .release-details-cover {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1/1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-fucsia);
      margin: 0 auto;
      box-shadow: 0 12px 40px rgba(255, 43, 214, 0.10);
    }

    @media (min-width: 768px) {
      .release-details-cover { margin: 0; }
    }

    .release-details-cover img { width: 100%; height: 100%; object-fit: cover; }

    .release-details-info { flex: 1; }

    /* MODAL LIGHTBOX ACCESIBLE */
    .lightbox-modal-backdrop {
      position: fixed;
      inset: 0;
      background-color: rgba(5, 5, 8, 0.98);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    @media (min-width: 1024px) {
      .lightbox-modal-backdrop { backdrop-filter: blur(12px); }
    }

    .lightbox-modal-backdrop.active { display: flex; }

    .lightbox-video-frame {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-fucsia);
      box-shadow: 0 12px 50px rgba(0,0,0,0.8);
    }

    .lightbox-close-trigger {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(5, 5, 8, 0.85);
      border: 1px solid var(--border);
      color: #fff;

    .notification-toast {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--panel);

      padding: 0.8rem 1.6rem;
      border-radius: 8px;

      border-left: 4px solid var(--fucsia);

      border-bottom: 1px solid var(--border);
      z-index: 1000;

      transform: translateY(15px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      font-size: 0.85rem;
      font-weight: 500;

        a: { es: "Las entregas se hacen vía nube en alta resolución: WAV/AIFF a 24 bits, stems separados cuando el proyecto lo requiere y masters listos para distribución digital. Todo cumple los estándares técnicos de las principales plataformas de streaming.", en: "Deliveries are made via cloud in high resolution: 24-bit WAV/AIFF, separated stems when the project requires it, and masters ready for digital distribution. Everything meets the technical standards of the major streaming platforms.", fr: "Les livraisons se font via le cloud en haute résolution : WAV/AIFF 24 bits, stems séparés si le projet l'exige, et masters prêts pour la distribution numérique. Le tout respecte les normes techniques des grandes plateformes de streaming.", de: "Lieferungen erfolgen über die Cloud in hoher Auflösung: 24-Bit-WAV/AIFF, separate Stems bei Bedarf und Master, die bereit für den digitalen Vertrieb sind. Alles erfüllt die technischen Standards der großen Streaming-Plattformen.", ru: "Передача файлов — через облако в высоком разрешении: 24-битные WAV/AIFF, отдельные стемы при необходимости и мастеры, готовые к цифровой дистрибуции. Всё соответствует техническим стандартам крупных стриминговых платформ.", it: "Le consegne avvengono via cloud in alta risoluzione: WAV/AIFF a 24 bit, stem separati quando serve e master pronti per la distribuzione digitale. Tutto rispetta gli standard tecnici delle principali piattaforme di streaming.", zh: "通过云端以高解析度交付：24 位 WAV/AIFF、按需提供的独立分轨，以及可直接用于数字发行的母带。全部符合主流流媒体平台的技术标准。" }

      {
        q: { es: "¿Manejas los derechos, créditos y metadatos para distribución global?", en: "Do you handle rights, credits and metadata for global distribution?", fr: "Gérez-vous les droits, crédits et métadonnées pour la distribution mondiale ?", de: "Kümmerst du dich um Rechte, Credits und Metadaten für die globale Distribution?", ru: "Занимаетесь ли вы правами, кредитами и метаданными для глобальной дистрибуции?", it: "Gestisci diritti, crediti e metadati per la distribuzione globale?", zh: "您是否处理全球发行的版权、署名和元数据？" },
        a: { es: "Sí. Preparo metadatos limpios y consistentes (ISRC, créditos de composición y producción, splits) y oriento sobre el registro de derechos. La sección AI Metadata del sitio refleja este cuidado por la trazabilidad y la atribución correcta de cada obra.", en: "Yes. I prepare clean, consistent metadata (ISRC, writing and production credits, splits) and advise on rights registration. The site's AI Metadata section reflects this care for traceability and correct attribution of each work.", fr: "Oui. Je prépare des métadonnées propres et cohérentes (ISRC, crédits d'écriture et de production, répartitions) et conseille sur l'enregistrement des droits. La section AI Metadata du site illustre ce soin de la traçabilité et de l'attribution correcte.", de: "Ja. Ich erstelle saubere, konsistente Metadaten (ISRC, Autoren- und Produktions-Credits, Splits) und berate zur Rechteregistrierung. Der Bereich AI Metadata der Website spiegelt diese Sorgfalt für Nachvollziehbarkeit und korrekte Zuordnung wider.", ru: "Да. Я готовлю чистые, согласованные метаданные (ISRC, авторские и продюсерские кредиты, сплиты) и консультирую по регистрации прав. Раздел AI Metadata на сайте отражает эту заботу о прослеживаемости и корректной атрибуции.", it: "Sì. Preparo metadati puliti e coerenti (ISRC, crediti di scrittura e produzione, split) e fornisco consulenza sulla registrazione dei diritti. La sezione AI Metadata del sito riflette questa cura per la tracciabilità e la corretta attribuzione.", zh: "是的。我会准备干净一致的元数据（ISRC、词曲与制作署名、分成），并就版权登记提供建议。网站的 AI Metadata 板块体现了对可追溯性与正确署名的重视。" }

      {
        q: { es: "¿Cómo gestionas las diferencias de zona horaria?", en: "How do you manage time-zone differences?", fr: "Comment gérez-vous les décalages horaires ?", de: "Wie gehst du mit Zeitzonenunterschieden um?", ru: "Как вы справляетесь с разницей часовых поясов?", it: "Come gestisci le differenze di fuso orario?", zh: "您如何应对时差？" },
        a: { es: "Trabajo con agenda flexible cubriendo husos de América y Europa. Las sesiones en vivo se reservan con anticipación y, para el resto del flujo, el intercambio asíncrono de archivos permite avanzar sin importar la diferencia horaria del cliente.", en: "I work with a flexible schedule covering American and European time zones. Live sessions are booked in advance, and for the rest of the workflow, asynchronous file exchange keeps things moving regardless of the client's time difference.", fr: "Je travaille avec un agenda flexible couvrant les fuseaux américains et européens. Les sessions live se réservent à l'avance et, pour le reste, l'échange asynchrone de fichiers permet d'avancer quel que soit le décalage du client.", de: "Ich arbeite mit flexiblem Zeitplan über amerikanische und europäische Zeitzonen. Live-Sessions werden im Voraus gebucht; im übrigen Ablauf hält der asynchrone Dateiaustausch das Projekt unabhängig vom Zeitunterschied in Bewegung.", ru: "Я работаю по гибкому графику, охватывая часовые пояса Америки и Европы. Живые сессии бронируются заранее, а для остального процесса асинхронный обмен файлами позволяет двигаться вперёд независимо от разницы во времени.", it: "Lavoro con un'agenda flessibile che copre i fusi americani ed europei. Le sessioni live si prenotano in anticipo e, per il resto del flusso, lo scambio asincrono di file consente di avanzare indipendentemente dal fuso del cliente.", zh: "我采用灵活的日程，覆盖美洲与欧洲时区。实时会话需提前预约；其余流程通过异步文件交换推进，不受客户时差影响。" }

      {
        q: { es: "¿Cuánto tarda un proyecto típico de principio a fin?", en: "How long does a typical project take from start to finish?", fr: "Combien de temps prend un projet type du début à la fin ?", de: "Wie lange dauert ein typisches Projekt von Anfang bis Ende?", ru: "Сколько времени занимает типичный проект от начала до конца?", it: "Quanto dura un progetto tipico dall'inizio alla fine?", zh: "一个典型项目从头到尾需要多长时间？" },
        a: { es: "Un sencillo suele tomar entre dos y cuatro semanas según la complejidad y las rondas de revisión; un proyecto de álbum se planifica por fases. Tras recibir tu brief y referencias, recibirás un cronograma claro con hitos y fechas de entrega.", en: "A single usually takes two to four weeks depending on complexity and revision rounds; an album project is planned in phases. After receiving your brief and references, you'll get a clear timeline with milestones and delivery dates.", fr: "Un single prend généralement deux à quatre semaines selon la complexité et les révisions ; un album se planifie par phases. Après réception de votre brief et de vos références, vous recevez un calendrier clair avec jalons et dates de livraison.", de: "Eine Single dauert meist zwei bis vier Wochen, je nach Komplexität und Revisionsrunden; ein Album wird in Phasen geplant. Nach Erhalt deines Briefings und der Referenzen bekommst du einen klaren Zeitplan mit Meilensteinen und Lieferterminen.", ru: "Сингл обычно занимает от двух до четырёх недель в зависимости от сложности и числа правок; альбом планируется поэтапно. После получения брифа и референсов вы получите чёткий график с этапами и датами сдачи.", it: "Un singolo richiede di solito da due a quattro settimane in base a complessità e revisioni; un album si pianifica per fasi. Dopo aver ricevuto il tuo brief e i riferimenti, riceverai una tabella di marcia chiara con tappe e date di consegna.", zh: "单曲通常需两到四周，视复杂度与修改轮次而定；专辑项目则分阶段规划。收到您的需求说明与参考后，您将获得包含里程碑与交付日期的清晰时间表。" }

      {
        q: { es: "¿Cómo iniciamos una colaboración?", en: "How do we start a collaboration?", fr: "Comment démarrer une collaboration ?", de: "Wie starten wir eine Zusammenarbeit?", ru: "Как начать сотрудничество?", it: "Come iniziamo una collaborazione?", zh: "我们如何开始合作？" },
        a: { es: "Usa el cotizador de esta página para generar un brief y un presupuesto estimado en minutos; al finalizar se envía directamente por WhatsApp. También puedes escribir por correo. Responderé con disponibilidad, próximos pasos y cualquier ajuste necesario.", en: "Use the quote tool on this page to generate a brief and an estimated budget in minutes; when finished it's sent straight via WhatsApp. You can also reach out by email. I'll reply with availability, next steps and any needed adjustments.", fr: "Utilisez l'outil de devis de cette page pour générer un brief et un budget estimé en quelques minutes ; il s'envoie ensuite directement via WhatsApp. Vous pouvez aussi écrire par e-mail. Je répondrai avec mes disponibilités, les étapes suivantes et les ajustements nécessaires.", de: "Nutze das Angebots-Tool auf dieser Seite, um in Minuten ein Briefing und ein geschätztes Budget zu erstellen; am Ende wird es direkt per WhatsApp gesendet. Du kannst auch per E-Mail schreiben. Ich antworte mit Verfügbarkeit, nächsten Schritten und nötigen Anpassungen.", ru: "Воспользуйтесь калькулятором на этой странице, чтобы за минуты сформировать бриф и предварительный бюджет; в конце он отправляется прямо в WhatsApp. Также можно написать на почту. Я отвечу с информацией о доступности, следующих шагах и необходимых корректировках.", it: "Usa il preventivatore di questa pagina per generare un brief e un budget stimato in pochi minuti; al termine viene inviato direttamente via WhatsApp. Puoi anche scrivere via e-mail. Risponderò con disponibilità, prossimi passi ed eventuali aggiustamenti.", zh: "使用本页的报价工具，几分钟内即可生成需求说明与预算估算，完成后直接通过 WhatsApp 发送。您也可以发邮件联系。我会回复档期、后续步骤及所需的任何调整。" }

    // OFUSCADOR DE CONTACTO ANTI-SPAM
    const Obfuscator = {
      decode: (b64) => {
        try { return atob(b64); } catch (e) { return b64; }
      },
      init: () => {
        document.querySelectorAll('[data-obf-email]').forEach(el => {
          const email = Obfuscator.decode(el.getAttribute('data-obf-email'));
          if (el.tagName === 'A') el.href = `mailto:${email}`;
          el.textContent = email;
        });
        document.querySelectorAll('[data-obf-phone]').forEach(el => {
          const phone = Obfuscator.decode(el.getAttribute('data-obf-phone'));
          const clean = phone.replace(/[^0-9]/g, '');
          if (el.tagName === 'A') el.href = `https://wa.me/${clean}`;
          el.textContent = phone;
        });
      }
    };

    // ============================================================
    // MOTOR DE ANIMACIONES SCROLL-TRIGGER (IntersectionObserver)
    // Marca automáticamente el contenido de cada vista con .rv y
    // lo revela al entrar al viewport. GPU-only (opacity/transform).
    // ============================================================
    const ScrollReveal = {
      observer: null,
      reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
      init: function() {
        if (this.reducedMotion || !('IntersectionObserver' in window)) return;
        this.observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('in-view');
              this.observer.unobserve(entry.target); // revela una sola vez → cero trabajo posterior
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
      },
      scan: function(root) {
        if (!root) return;

        // 1) Optimización de imágenes inyectadas dinámicamente
        root.querySelectorAll('img').forEach(img => {
          if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
          img.setAttribute('decoding', 'async');
        });

        if (this.reducedMotion || !this.observer) return;

        // 2) Bloques de primer nivel de la vista
        root.querySelectorAll('.view-container').forEach(section => {
          Array.from(section.children).forEach((child, i) => {
            child.classList.add('rv');
            child.style.setProperty('--rv-i', Math.min(i, 3));
            this.observer.observe(child);
          });
        });

        // 3) Stagger fino en rejillas (tarjetas, videos, diferenciadores)
        root.querySelectorAll('.card-grid, .video-library-grid, .grid-differentiator, .grid-services').forEach(grid => {
          Array.from(grid.children).forEach((card, i) => {
            card.classList.add('rv', 'rv-scale');
            card.style.setProperty('--rv-i', i % 8);
            this.observer.observe(card);
          });
        });
      }
    };

    // Hook común tras renderizar cualquier ruta
    function afterRender() {
      ScrollReveal.scan(document.getElementById('viewport'));
      applyTranslations(document.getElementById('viewport'));
    }

    // ==========================================
    // MOTOR DE TEMA (claro / oscuro) + IDIOMA
    // ==========================================
    const appState = { lang: 'es', theme: 'dark' };

    function safeGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
    function safeSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }

    window.toggleTheme = function() {
      appState.theme = appState.theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      safeSet('jots-theme', appState.theme);
    };

    function applyTheme() {
      const root = document.documentElement;
      if (appState.theme === 'light') root.setAttribute('data-theme', 'light');
      else root.removeAttribute('data-theme');
      const sw = document.getElementById('themeSwitch');
      if (sw) sw.setAttribute('aria-checked', appState.theme === 'light' ? 'true' : 'false');
    }

    window.setLanguage = function(lang) {
      if (!I18N[lang]) lang = 'es';
      appState.lang = lang;
      document.documentElement.lang = lang;
      safeSet('jots-lang', lang);
      const sel = document.getElementById('langSelect');
      if (sel && sel.value !== lang) sel.value = lang;
      applyTranslations(document);
      if (document.getElementById('faqList')) renderFAQ();
    };

    function applyTranslations(scope) {
      scope = scope || document;
      const dict = I18N[appState.lang] || I18N.es;
      const fb = I18N.es;
      scope.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.getAttribute('data-i18n');
        const v = dict[k] != null ? dict[k] : fb[k];
        if (v != null) el.textContent = v;
      });
      scope.querySelectorAll('[data-i18n-html]').forEach(el => {
        const k = el.getAttribute('data-i18n-html');
        const v = dict[k] != null ? dict[k] : fb[k];
        if (v != null) el.innerHTML = v;
      });
    }

    // ==========================================
    // RENDER DEL FAQ (multilingüe)
    // ==========================================
    window.toggleFAQ = function(i) {
      const item = document.getElementById('faqItem' + i);
      if (!item) return;
      const ans = item.querySelector('.faq-a');
      const open = item.classList.toggle('open');
      const btn = item.querySelector('.faq-q');
      if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      ans.style.maxHeight = open ? (ans.scrollHeight + 'px') : '0px';
    };

    function renderFAQ() {
      const list = document.getElementById('faqList');
      if (!list) return;
      const L = appState.lang;
      list.innerHTML = FAQ_DATA.map((item, i) => `
        <div class="faq-item" id="faqItem${i}">
          <button class="faq-q" type="button" aria-expanded="false" onclick="toggleFAQ(${i})">
            <span>${(item.q[L] || item.q.es)}</span>
            <span class="faq-q__icon" aria-hidden="true">+</span>
          </button>
          <div class="faq-a">
            <div class="faq-a__inner">${(item.a[L] || item.a.es)}</div>
          </div>
        </div>
      `).join('');
    }

    // LIGHTBOX DEL REPRODUCTOR
    const Lightbox = {
      el: null,
      container: null,
      init: function() {
        if (!this.el) {
          this.el = document.createElement('div');
          this.el.className = 'lightbox-modal-backdrop';
          this.el.id = 'youtubeLightbox';
          this.el.setAttribute('role', 'dialog');
          this.el.setAttribute('aria-modal', 'true');
          this.el.setAttribute('aria-label', 'Reproductor de Video');
          this.el.innerHTML = `
            <div class="lightbox-video-frame">
              <button class="lightbox-close-trigger" id="closeLightboxBtn" aria-label="Cerrar reproductor">×</button>
              <div id="lightboxIframeContainer" style="width: 100%; height: 100%;"></div>
            </div>
          `;
          document.body.appendChild(this.el);

          this.container = this.el.querySelector('#lightboxIframeContainer');

          this.el.querySelector('#closeLightboxBtn').addEventListener('click', () => this.close());
          this.el.addEventListener('click', (e) => {
            if (e.target === this.el) this.close();
          });
        }
      },
      open: function(videoId) {
        this.init();
        if (this.container) {
          this.container.innerHTML = `
            <iframe 
              class="lightbox-iframe-embed"
              src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" 
              title="Youtube Video Player"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
              allowfullscreen>
            </iframe>
          `;
        }
        if (this.el) this.el.classList.add('active');
        document.body.style.overflow = 'hidden';
      },
      close: function() {
        if (this.el) this.el.classList.remove('active');
        if (this.container) this.container.innerHTML = '';
        document.body.style.overflow = '';
      }
    };

    // ALERTAS TOAST PERSONALIZADAS
    function showToast(message) {
      const existingToast = document.querySelector('.notification-toast');
      if (existingToast) existingToast.remove();

      const toast = document.createElement('div');
      toast.className = 'notification-toast';
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => toast.classList.add('show'), 50);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    // CONTROLLER SPA DEL RUTEO DE PÁGINAS
    const Router = {
      routes: {},
      addRoute: function(path, handler) { this.routes[path] = handler; },
      resolve: function() {
        const hash = window.location.hash || '#/';
        let matchedHandler = null;
        let params = {};

        for (const routePath in this.routes) {
          const routeRegex = new RegExp("^" + routePath.replace(/:[^\s/]+/g, "([\\w-]+)") + "$");
          const match = hash.match(routeRegex);
          if (match) {
            matchedHandler = this.routes[routePath];
            const paramNames = (routePath.match(/:[^\s/]+/g) || []).map(p => p.slice(1));
            paramNames.forEach((name, idx) => { params[name] = match[idx + 1]; });
            break;
          }
        }

        if (matchedHandler) {
          const result = matchedHandler(params);
          // Soporta handlers síncronos y asíncronos; revela contenido tras el render
          if (result && typeof result.then === 'function') {
            result.then(() => afterRender());
          } else {
            afterRender();
          }
        } else {
          window.location.hash = '#/';
        }
        this.updateActiveLinks(hash);
        window.scrollTo(0, 0);
      },
      updateActiveLinks: function(currentHash) {
        let activeRoute = 'home';
        if (currentHash.startsWith('#/proyecto')) activeRoute = 'proyecto';
        else if (currentHash.startsWith('#/musica') || currentHash.startsWith('#/release') || currentHash.startsWith('#/album') || currentHash.startsWith('#/discografia')) activeRoute = 'musica';
        else if (currentHash.startsWith('#/videos')) activeRoute = 'videos';
        else if (currentHash.startsWith('#/servicios')) activeRoute = 'servicios';
        else if (currentHash.startsWith('#/sobre-joe')) activeRoute = 'sobre-joe';
        else if (currentHash.startsWith('#/prensa')) activeRoute = 'prensa';
        else if (currentHash.startsWith('#/cotizador')) activeRoute = 'cotizador';
        else if (currentHash.startsWith('#/contacto')) activeRoute = 'contacto';
        else if (currentHash.startsWith('#/ai')) activeRoute = 'ai';

        document.querySelectorAll('[data-route]').forEach(link => {
          if (link.getAttribute('data-route') === activeRoute) link.classList.add('active');
          else link.classList.remove('active');
        });
      }
    };

      const inputs = document.getElementById('wrapperPlatformInputs');
      if (inputs) inputs.style.display = show ? 'block' : 'none';
      quoterState.tienePerfil = show ? "SI" : "NO";

      const btns = document.querySelectorAll('[data-quoter-var="perfil_plataformas"] .quoter-option-btn');
      btns.forEach(b => {
        const val = b.getAttribute('data-value');
        if ((show && val === "SI") || (!show && val === "NO")) {
          b.classList.add('selected');
        } else {
          b.classList.remove('selected');
        }
      });
    };

    window.updateQuoterStateFromInputs = function() {
      const occasionSel = document.getElementById('quoterOccasionSelect');
      const styleSel = document.getElementById('quoterStyleSelect');
      const nameInput = document.getElementById('quoterPlatformName');
      const linkInput = document.getElementById('quoterPlatformLink');

      if (occasionSel) {
        quoterState.ocasion.value = occasionSel.value;
        quoterState.ocasion.cost = parseInt(occasionSel.options[occasionSel.selectedIndex].getAttribute('data-cost'));
      }
      if (styleSel) {
        quoterState.estilo.value = styleSel.value;
        quoterState.estilo.cost = parseInt(styleSel.options[styleSel.selectedIndex].getAttribute('data-cost'));
      }
      if (nameInput) {
        quoterState.plataformaName = nameInput.value.trim();
      }
      if (linkInput) {
        quoterState.plataformaLink = linkInput.value.trim();
      }
    };

    window.updateQuoterExtras = function() {
      const checkBoxes = document.querySelectorAll('.quoter-extra-cb');
      quoterState.extras = [];
      checkBoxes.forEach(cb => {
        if (cb.checked) {
          quoterState.extras.push({
            value: cb.getAttribute('data-value'),
            cost: parseInt(cb.getAttribute('data-cost'))
          });
        }
      });
    };

    function setupQuoterListeners() {
      const container = document.getElementById('viewport');
      if (!container) return;

      const stepContainers = container.querySelectorAll('.quoter-options-container');
      stepContainers.forEach(group => {
        const key = group.getAttribute('data-quoter-var');
        if (!key || key === 'perfil_plataformas') return;
        const buttons = group.querySelectorAll('.quoter-option-btn');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');

            if (key === 'formato') {
              quoterState.formato.value = btn.getAttribute('data-value');
              quoterState.formato.multiplier = parseFloat(btn.getAttribute('data-multiplier'));
            } else if (key === 'vocal') {
              quoterState.vocal.value = btn.getAttribute('data-value');
              quoterState.vocal.hours = parseInt(btn.getAttribute('data-hours'));
            }
          });
        });
      });
    }

    window.navigateQuoter = function(dir) {
      if (dir === 1) {
        if (currentQuoterStep === 3) {
          const nameInput = document.getElementById('quoterPlatformName');
          const linkInput = document.getElementById('quoterPlatformLink');
          if (quoterState.tienePerfil === "SI" && nameInput && linkInput) {
            const platName = nameInput.value.trim();
            const platLink = linkInput.value.trim();
            if (!platName || !platLink) {
              showToast('Por favor introduce tu plataforma principal y el enlace a tu perfil.');
              return;
            }
            quoterState.plataformaName = platName;
            quoterState.plataformaLink = platLink;
          }
        }
        currentQuoterStep = Math.min(6, currentQuoterStep + 1);
      } else {
        currentQuoterStep = Math.max(1, currentQuoterStep - 1);
      }

      window.updateQuoterStateFromInputs();
      window.updateQuoterExtras();
      updateQuoterUI();
    };

      const baseOccasion = quoterState.ocasion.cost;
      const formatMultiplier = quoterState.formato.multiplier;
      const calculatedOccasion = Math.round(baseOccasion * formatMultiplier);

      const hoursCost = quoterState.vocal.hours * 200;
      const styleCost = quoterState.estilo.cost;
      const extrasCost = quoterState.extras.reduce((acc, curr) => acc + curr.cost, 0);

    // INICIALIZADORES DEL SISTEMA Y EVENTOS GLOBALIZADOS
    function initPreferences() {
      const savedTheme = safeGet('jots-theme');
      appState.theme = savedTheme === 'light' ? 'light' : 'dark';
      applyTheme();

      let savedLang = safeGet('jots-lang');
      if (!savedLang) {
        const nav = (navigator.language || 'es').slice(0,2).toLowerCase();
        savedLang = I18N[nav] ? nav : 'es';
      }
      appState.lang = I18N[savedLang] ? savedLang : 'es';
      document.documentElement.lang = appState.lang;
      const sel = document.getElementById('langSelect');
      if (sel) sel.value = appState.lang;
      applyTranslations(document);
    }

    document.addEventListener('DOMContentLoaded', () => {
      initPreferences();
      ScrollReveal.init();
      Lightbox.init();
    });

    window.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') Lightbox.close();
    });

    window.addEventListener('hashchange', () => Router.resolve(), { passive: true });
    window.addEventListener('load', () => {
      initPreferences();
      ScrollReveal.init(); // garantía si load llega antes que DOMContentLoaded en algunos navegadores embebidos
      Router.resolve();
